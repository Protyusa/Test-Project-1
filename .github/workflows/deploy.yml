name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        debug: true

        script: |
          cd /home/ec2-user/Test-Project

          git pull origin main

          sudo docker stop email-app || true
          sudo docker rm email-app || true

          sudo docker build -t email-app .

          sudo docker run -d -p 80:3000 --name email-app email-app
