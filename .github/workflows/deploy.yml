name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22

        script: |

          cd /home/ec2-user/Test-Project

          git pull origin main

          docker stop email-app || true
          docker rm email-app || true

          docker build -t email-app .

          docker run -d -p 80:3000 --name email-app email-app
