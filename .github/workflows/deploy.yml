name: Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22

        script: |

          cd /home/ec2-user

          if [ ! -d "Test-Project-1" ]; then
            git clone https://github.com/Protyusa/Test-Project-1.git
          fi

          cd Test-Project-1

          git pull origin main

          sudo docker compose down

          sudo docker compose up -d --build
