name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: SSH Deploy
      uses: appleboy/ssh-action@v1.0.0

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}

        script: |
          sudo docker pull ${{ secrets.DOCKER_IMAGE }}

          sudo docker stop email-container || true
          sudo docker rm email-container || true

          sudo docker run -d -p 80:3000 --name email-container ${{ secrets.DOCKER_IMAGE }}
