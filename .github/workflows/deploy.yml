name: Deploy to ECR + EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. AWS Login
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin 682366718561.dkr.ecr.us-east-1.amazonaws.com

    # 4. Get Backend Version Tag
    - name: Backend Version Tag
      run: |
        TAGS=$(aws ecr describe-images \
          --repository-name backend-app \
          --query 'imageDetails[].imageTags[]' \
          --output text | tr '\t' '\n' | grep latest || true)

        if echo "$TAGS" | grep -q "latest"; then
          COUNT=$(echo "$TAGS" | grep -E "latest\.[0-9]+" | wc -l)
          echo "BACKEND_TAG=latest.$((COUNT+1))" >> $GITHUB_ENV
        else
          echo "BACKEND_TAG=latest" >> $GITHUB_ENV
        fi

    # 5. Get Frontend Version Tag
    - name: Frontend Version Tag
      run: |
        TAGS=$(aws ecr describe-images \
          --repository-name frontend-app \
          --query 'imageDetails[].imageTags[]' \
          --output text | tr '\t' '\n' | grep latest || true)

        if echo "$TAGS" | grep -q "latest"; then
          COUNT=$(echo "$TAGS" | grep -E "latest\.[0-9]+" | wc -l)
          echo "FRONTEND_TAG=latest.$((COUNT+1))" >> $GITHUB_ENV
        else
          echo "FRONTEND_TAG=latest" >> $GITHUB_ENV
        fi

    # 6. Build Images
    - name: Build Images
      run: |
        docker build -t backend-app ./Backend
        docker build -t frontend-app ./Frontend

    # 7. Tag Images
    - name: Tag Images
      run: |
        docker tag backend-app:latest 682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:$BACKEND_TAG
        docker tag frontend-app:latest 682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:$FRONTEND_TAG

        # also tag latest
        docker tag backend-app:latest 682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:latest
        docker tag frontend-app:latest 682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:latest

    # 8. Push Images
    - name: Push Images
      run: |
        docker push 682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:$BACKEND_TAG 
        docker push 682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:latest

        docker push 682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:$FRONTEND_TAG
        docker push 682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:latest

    # 9. Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22

        script: |
          cd /home/ubuntu/Test-Project-1

          git pull origin main

          aws ecr get-login-password --region us-east-1 \
          | sudo docker login --username AWS --password-stdin 682366718561.dkr.ecr.us-east-1.amazonaws.com

          sudo docker stop backend-container || true
          sudo docker stop frontend-container || true

          sudo docker rm backend-container || true
          sudo docker rm frontend-container || true

          sudo docker pull 682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:latest
          sudo docker pull 682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:latest

          sudo docker run -d -p 5000:5000 --name backend-container \
          682366718561.dkr.ecr.us-east-1.amazonaws.com/backend-app:latest

          sudo docker run -d -p 80:80 --name frontend-container \
          682366718561.dkr.ecr.us-east-1.amazonaws.com/frontend-app:latest
