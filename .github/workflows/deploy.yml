name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: SSH Deploy
      uses: appleboy/ssh-action@v1.0.0

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22

        script: |
          cd /home/ubuntu/Test-Project

          git pull origin main

          docker compose down || true
          docker compose up -d --build
