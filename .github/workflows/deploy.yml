name: Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22

        script: |
          cd /home/ubuntu/Test-Project-1

          git pull origin main

          sudo docker stop frontend-container || true
          
          sudo docker stop backend-container || true

          sudo docker rm frontend-container || true
          sudo docker rm backend-container || true

          # build images
          sudo docker build -t backend-app ./Backend
          sudo docker build -t frontend-app ./Frontend

          # run containers
          sudo docker run -d -p 5000:5000 --name backend-container backend-app
          sudo docker run -d -p 80:80 --name frontend-container frontend-app
